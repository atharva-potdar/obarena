[k0s_controller]
# Local dev — single-node controller+worker
localhost ansible_connection=local

# Prod controller — uncomment and set IP after terraform apply
# 10.0.10.100 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/k0s-key.pem

[k0s_workers]
# Prod platform workers — uncomment for production
# 10.0.10.101 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/k0s-key.pem
# 10.0.10.102 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/k0s-key.pem

[sandbox]
# Prod sandbox workers — uncomment for production
# 10.0.10.201 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/k0s-key.pem
# 10.0.10.202 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/k0s-key.pem

[k0s_all_workers:children]
k0s_workers
sandbox
