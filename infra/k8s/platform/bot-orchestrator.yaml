apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-orchestrator
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bot-orchestrator
  template:
    metadata:
      labels:
        app: bot-orchestrator
    spec:
      serviceAccountName: sandbox-orchestrator
      containers:
        - name: bot-orchestrator
          image: bot-orchestrator:dev
          imagePullPolicy: Never
          env:
            - name: REDPANDA_BROKERS
              value: "redpanda.platform.svc.cluster.local:9092"
            - name: NUM_BOTS
              value: "50"
            - name: DURATION_SECONDS
              value: "60"
            - name: JOB_TIMEOUT_SECONDS
              value: "240"
            - name: BOT_RUNNER_IMAGE
              value: "bot-runner:dev"
          resources:
            requests:
              memory: 64Mi
              cpu: "100m"
            limits:
              memory: 128Mi
              cpu: "250m"

