apiVersion: apps/v1
kind: Deployment
metadata:
  name: submission-api
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: submission-api
  template:
    metadata:
      labels:
        app: submission-api
    spec:
      containers:
        - name: submission-api
          image: submission-api:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SEAWEEDFS_ENDPOINT
              value: "http://seaweedfs.platform.svc.cluster.local:8333"
            - name: REDPANDA_BROKERS
              value: "redpanda.platform.svc.cluster.local:9092"
            - name: MAX_UPLOAD_SIZE_MB
              value: "50"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 64Mi
              cpu: "100m"
            limits:
              memory: 128Mi
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: submission-api
  namespace: platform
spec:
  selector:
    app: submission-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
