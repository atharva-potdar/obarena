apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-ws
  namespace: platform
  labels:
    {{- include "iicpc.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: leaderboard-ws
  template:
    metadata:
      labels:
        {{- include "iicpc.labels" . | nindent 8 }}
        app.kubernetes.io/name: leaderboard-ws
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector.platform | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations.platform | nindent 8 }}
      containers:
        - name: leaderboard-ws
          image: {{ include "iicpc.image" (list . "leaderboard-ws") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: REDIS_ADDR
              value: "redis.platform.svc.cluster.local:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iicpc-redis
                  key: password
            - name: PORT
              value: "8090"
          ports:
            - name: http
              containerPort: 8090
          resources:
            {{- toYaml .Values.resources.leaderboardWs | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
