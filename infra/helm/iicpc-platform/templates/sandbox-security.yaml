apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-security-reference
  namespace: platform
  labels:
    {{- include "iicpc.labels" . | nindent 4 }}
data:
  README.md: |
    # Sandbox Security Strategy Reference

    This ConfigMap exists to document the runtime security boundaries enforced on sandbox pods.
    The sandbox-orchestrator service dynamically reads parameters from its environment variables
    and stamps the following security configuration onto every spawned sandbox pod.

    ## Container securityContext (enforced by sandbox-orchestrator):
    ```yaml
    securityContext:
      runAsNonRoot: true
      runAsUser: 65534                    # nobody
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      seccompProfile:
        type: Localhost
        localhostProfile: sandbox-seccomp.json   # Placed by Terraform EC2 userdata
      capabilities:
        drop: ["ALL"]
    ```

    ## Container-level AppArmor profile (GA since K8s v1.31):
    ```yaml
    securityContext:
      appArmorProfile:
        type: RuntimeDefault
    ```

    ## Isolation Strategy:
    1. CPU pinning via static CPU manager (Guaranteed QoS)
    2. seccomp profile (syscall allowlist)
    3. Unprivileged user (nobody)
    4. Read-only root filesystem (with emptyDir at /tmp)
    5. Capability drop (ALL)
