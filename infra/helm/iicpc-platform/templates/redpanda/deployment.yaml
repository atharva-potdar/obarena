apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: platform
  labels:
    {{- include "iicpc.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda
  template:
    metadata:
      labels:
        {{- include "iicpc.labels" . | nindent 8 }}
        app.kubernetes.io/name: redpanda
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector.platform | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations.platform | nindent 8 }}
      containers:
        - name: redpanda
          image: {{ .Values.thirdParty.redpanda.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - rpk
            - redpanda
            - start
            {{- if .Values.redpanda.devMode }}
            - --mode=dev-container
            - --overprovisioned
            {{- else }}
            # In production mode we disable the dev container bypasses
            - --reserve-memory=0M
            {{- end }}
            - --smp=1
            - --memory=512M
            - --kafka-addr=0.0.0.0:9092
            - --advertise-kafka-addr=redpanda.platform.svc.cluster.local:9092
            - --pandaproxy-addr=0.0.0.0:8082
            - --schema-registry-addr=0.0.0.0:8081
          ports:
            - name: kafka
              containerPort: 9092
            - name: admin
              containerPort: 9644
            - name: http-proxy
              containerPort: 8082
            - name: schema-registry
              containerPort: 8081
          resources:
            requests:
              memory: 512Mi
              cpu: "500m"
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 10
            periodSeconds: 5
