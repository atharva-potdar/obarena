apiVersion: apps/v1
kind: Deployment
metadata:
  name: submission-api
  namespace: platform
  labels:
    {{- include "iicpc.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: submission-api
  template:
    metadata:
      labels:
        {{- include "iicpc.labels" . | nindent 8 }}
        app.kubernetes.io/name: submission-api
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector.platform | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations.platform | nindent 8 }}
      containers:
        - name: submission-api
          image: {{ include "iicpc.image" (list . "submission-api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: REDPANDA_BROKERS
              value: "redpanda.platform.svc.cluster.local:9092"
            - name: SEAWEEDFS_ENDPOINT
              value: "http://seaweedfs.platform.svc.cluster.local:8333"
          ports:
            - name: http
              containerPort: 8080
          resources:
            {{- toYaml .Values.resources.submissionApi | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
