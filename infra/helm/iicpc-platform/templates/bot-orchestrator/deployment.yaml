apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-orchestrator
  namespace: platform
  labels:
    {{- include "iicpc.labels" . | nindent 4 }}
spec:
  replicas: 1 # Strict Singleton
  selector:
    matchLabels:
      app.kubernetes.io/name: bot-orchestrator
  template:
    metadata:
      labels:
        {{- include "iicpc.labels" . | nindent 8 }}
        app.kubernetes.io/name: bot-orchestrator
    spec:
      serviceAccountName: bot-orchestrator
      nodeSelector:
        {{- toYaml .Values.nodeSelector.platform | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations.platform | nindent 8 }}
      containers:
        - name: bot-orchestrator
          image: {{ include "iicpc.image" (list . "bot-orchestrator") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: REDPANDA_BROKERS
              value: "redpanda.platform.svc.cluster.local:9092"
            - name: BOT_RUNNER_IMAGE
              value: {{ include "iicpc.image" (list . "bot-runner") | quote }}
            - name: NUM_BOTS
              value: {{ .Values.botOrchestrator.numBots | quote }}
            - name: DURATION_SECONDS
              value: {{ .Values.botOrchestrator.durationSeconds | quote }}
          ports:
            - name: http
              containerPort: 8080
          resources:
            {{- toYaml .Values.resources.botOrchestrator | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
