networkPolicies:
  enabled: true

image:
  registry: "" # Default local/empty; populated by values-prod.yaml
  tag: dev
  pullPolicy: IfNotPresent

thirdParty:
  redis:       { image: "redis:8-alpine" }
  redpanda:    { image: "docker.redpanda.com/redpandadata/redpanda:v26.1.7" }
  timescaledb: { image: "timescale/timescaledb:latest-pg18" }
  seaweedfs:   { image: "chrislusf/seaweedfs:latest" }

timescaledb:
  password: obarena # Override via --set during deploy

redis:
  password: redispass # Override via --set during deploy

# SeaweedFS S3 accepts arbitrary credentials in dev; use a Secret in prod.
s3:
  accessKey: any
  secretKey: any

redpanda:
  devMode: true

nodeSelector:
  platform: { workload: platform }
  sandbox:  { workload: sandbox }
  bots:     { workload: bots }

tolerations:
  platform:
    - key: workload
      operator: Equal
      value: platform
      effect: NoSchedule
  sandbox:
    - key: workload
      operator: Equal
      value: sandbox
      effect: NoSchedule
  bots:
    - key: workload
      operator: Equal
      value: bots
      effect: NoSchedule

sandboxOrchestrator:
  sandboxCpuRequest:    "2"
  sandboxCpuLimit:      "2"
  sandboxMemoryRequest: "512Mi"
  sandboxMemoryLimit:   "512Mi"
  seccompProfilePath:   "sandbox-seccomp.json"
  runAsUser:            65534
  nodeSelectorKey:      workload
  nodeSelectorValue:    sandbox
  tolerationKey:        workload
  tolerationValue:      sandbox

botOrchestrator:
  numBots:         50
  durationSeconds: 60

resources:
  submissionApi:
    requests: { cpu: 100m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 128Mi }
  buildService:
    requests: { cpu: 500m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 1024Mi }
  sandboxOrchestrator:
    requests: { cpu: 250m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  telemetryIngester:
    requests: { cpu: 200m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  leaderboardWs:
    requests: { cpu: 100m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 128Mi }
  botOrchestrator:
    requests: { cpu: 100m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 128Mi }

hpa:
  enabled: true
  leaderboardWs: { minReplicas: 2, maxReplicas: 6, cpuTarget: 70 }
  submissionApi: { minReplicas: 2, maxReplicas: 10, cpuTarget: 70 }

kedaScaling:
  pollingInterval: 30
  cooldownPeriod: 120
  auth:
    enabled: false
  buildService:
    minReplicas: 1
    maxReplicas: 4
    lagThreshold: "10"
    topic: submission.lifecycle
    consumerGroup: build-service
  sandboxOrchestrator:
    minReplicas: 1
    maxReplicas: 4
    lagThreshold: "10"
    topic: submission.lifecycle
    consumerGroup: sandbox-orchestrator
  telemetryIngester:
    minReplicas: 1
    maxReplicas: 8
    lagThreshold: "10"
    topic: bot.metrics
    consumerGroup: telemetry-ingester

ingress:
  enabled: true
  className: nginx
  host: obarena.example.com

storage:
  # Deprecated fallback. Prefer the per-service fields below.
  # If set, this is used only when seaweedfsStorageClass / timescaledbStorageClass are empty.
  className: ""

  # Set to true only in environments where this chart should create Longhorn-backed
  # StorageClasses itself (e.g. local k0s dev). Leave false in cloud/prod and point
  # the PVCs at the provider-native StorageClass instead.
  createStorageClasses: false

  # Longhorn Replica Count for the created StorageClasses (only active if createStorageClasses: true).
  # Set to "1" for single-node developer clusters to avoid scheduling overhead and disk warnings.
  # Set to "2" or "3" in multi-node staging/production clusters for high availability and durability.
  replicaCount: 1

  # Explicit per-workload storage classes.
  seaweedfsStorageClass: ""
  timescaledbStorageClass: ""

  seaweedfs:
    size: 10Gi

  timescaledb:
    size: 10Gi

  buildArtifacts:
    # Build pods download source and upload binaries via pre-signed S3 URLs.
    # This value is not currently consumed by a PVC — SeaweedFS stores artifacts in its own volume.
    # Retained for documentation of the expected artifact storage budget.
    size: 10Gi

# ─── JWT Auth + Per-Team Rate Limiting (submission-api) ──────────────────────
# Requires envoyConfig.enabled=true in Cilium (set in site.yml).
# Set jwt.enabled=true in values-prod.yaml and provide a real RSA public key.
jwt:
  enabled: false
  issuer: "https://auth.obarena.example.com"
  # RSA public key PEM for offline JWT signature verification.
  # Generate: openssl genrsa -out jwt.key 2048 && openssl rsa -in jwt.key -pubout -out jwt.pub
  # Paste the contents of jwt.pub here. Only the public half is needed.
  publicKey: |
    -----BEGIN PUBLIC KEY-----
    PLACEHOLDER_REPLACE_WITH_REAL_RSA_PUBLIC_KEY
    -----END PUBLIC KEY-----
  rateLimit:
    maxTokens: 10      # bucket capacity
    tokensPerFill: 10  # tokens added each fill interval
    fillInterval: 60s  # refill period (10 req/min per team)
    maxTeams: 200      # max distinct team_id values tracked in LRU cache

