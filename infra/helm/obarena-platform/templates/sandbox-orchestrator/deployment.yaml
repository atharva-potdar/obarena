apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-orchestrator
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox-orchestrator
  template:
    metadata:
      labels:
        {{- include "obarena.labels" . | nindent 8 }}
        app.kubernetes.io/name: sandbox-orchestrator
    spec:
      serviceAccountName: sandbox-orchestrator
      nodeSelector:
        {{- toYaml .Values.nodeSelector.platform | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations.platform | nindent 8 }}
      containers:
        - name: sandbox-orchestrator
          image: {{ include "obarena.image" (list . "sandbox-orchestrator") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: REDPANDA_BROKERS
              value: "redpanda.platform.svc.cluster.local:9092"
            - name: SEAWEEDFS_ENDPOINT
              value: "http://seaweedfs.platform.svc.cluster.local:8333"
            - name: SANDBOX_CPU_REQUEST
              value: {{ .Values.sandboxOrchestrator.sandboxCpuRequest | quote }}
            - name: SANDBOX_CPU_LIMIT
              value: {{ .Values.sandboxOrchestrator.sandboxCpuLimit | quote }}
            - name: SANDBOX_MEMORY_REQUEST
              value: {{ .Values.sandboxOrchestrator.sandboxMemoryRequest | quote }}
            - name: SANDBOX_MEMORY_LIMIT
              value: {{ .Values.sandboxOrchestrator.sandboxMemoryLimit | quote }}
            - name: SANDBOX_SECCOMP_PROFILE_PATH
              value: {{ .Values.sandboxOrchestrator.seccompProfilePath | quote }}
            - name: SANDBOX_RUN_AS_USER
              value: {{ .Values.sandboxOrchestrator.runAsUser | quote }}
            - name: SANDBOX_NODE_SELECTOR_KEY
              value: {{ .Values.sandboxOrchestrator.nodeSelectorKey | quote }}
            - name: SANDBOX_NODE_SELECTOR_VALUE
              value: {{ .Values.sandboxOrchestrator.nodeSelectorValue | quote }}
            - name: SANDBOX_TOLERATION_KEY
              value: {{ .Values.sandboxOrchestrator.tolerationKey | quote }}
            - name: SANDBOX_TOLERATION_VALUE
              value: {{ .Values.sandboxOrchestrator.tolerationValue | quote }}
          resources:
            {{- toYaml .Values.resources.sandboxOrchestrator | nindent 12 }}
          livenessProbe:
            exec:
              command: ["pidof", "sandbox-orchestrator"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
