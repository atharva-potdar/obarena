apiVersion: batch/v1
kind: Job
metadata:
  name: redpanda-topics
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-10"
spec:
  template:
    metadata:
      name: redpanda-topics
    spec:
      restartPolicy: Never
      {{- include "obarena.platformScheduling" . | nindent 6 }}
      initContainers:
        - name: wait-for-redpanda
          image: curlimages/curl:latest
          command: ["sh", "-c", "until curl -s http://redpanda:9644/v1/status/ready; do echo waiting for redpanda; sleep 2; done;"]
      containers:
        - name: create-topics
          image: {{ .Values.thirdParty.redpanda.image }}
          command:
            - /bin/bash
            - -c
            - |
              if ! output=$(rpk topic create submission.lifecycle --partitions 4 --replicas 1 --brokers redpanda:9092 2>&1); then
                if ! echo "$output" | grep -q "TOPIC_ALREADY_EXISTS"; then
                  echo "$output" >&2
                  exit 1
                fi
              fi
              if ! output=$(rpk topic create bot.metrics --partitions 8 --replicas 1 --brokers redpanda:9092 2>&1); then
                if ! echo "$output" | grep -q "TOPIC_ALREADY_EXISTS"; then
                  echo "$output" >&2
                  exit 1
                fi
              fi
