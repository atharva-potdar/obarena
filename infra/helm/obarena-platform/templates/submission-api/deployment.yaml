apiVersion: apps/v1
kind: Deployment
metadata:
  name: submission-api
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: submission-api
  template:
    metadata:
      labels:
        {{- include "obarena.labels" . | nindent 8 }}
        app.kubernetes.io/name: submission-api
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector.platform | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations.platform | nindent 8 }}
      containers:
        - name: submission-api
          image: {{ include "obarena.image" (list . "submission-api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: REDPANDA_BROKERS
              value: "redpanda.platform.svc.cluster.local:9092"
            - name: KAFKA_TOPIC
              value: "submission.lifecycle"
            - name: S3_BUCKET
              value: "submissions"
            - name: SEAWEEDFS_ENDPOINT
              value: "http://seaweedfs.platform.svc.cluster.local:8333"
            # TODO: When migrating from SeaweedFS to real AWS S3:
            #   1. Set AWS_REGION to your target region (e.g. us-east-1)
            #   2. Mount AWS credentials from a Secret:
            #      - name: AWS_ACCESS_KEY_ID
            #        valueFrom:
            #          secretKeyRef:
            #            name: obarena-s3
            #            key: access-key-id
            #      - name: AWS_SECRET_ACCESS_KEY
            #        valueFrom:
            #          secretKeyRef:
            #            name: obarena-s3
            #            key: secret-access-key
            #   3. Remove SEAWEEDFS_ENDPOINT or point to real S3 endpoint
            #   4. Optionally use IAM roles (IRSA) instead of static credentials
          ports:
            - name: http
              containerPort: 8080
          resources:
            {{- toYaml .Values.resources.submissionApi | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
