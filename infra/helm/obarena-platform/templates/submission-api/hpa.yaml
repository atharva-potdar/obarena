{{- if .Values.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: submission-api
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: submission-api
  minReplicas: {{ .Values.hpa.submissionApi.minReplicas }}
  maxReplicas: {{ .Values.hpa.submissionApi.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.submissionApi.cpuTarget }}
{{- end }}
