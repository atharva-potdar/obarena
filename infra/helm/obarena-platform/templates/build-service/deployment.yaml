apiVersion: apps/v1
kind: Deployment
metadata:
  name: build-service
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: build-service
  template:
    metadata:
      labels:
        {{- include "obarena.labels" . | nindent 8 }}
        app.kubernetes.io/name: build-service
    spec:
      serviceAccountName: build-service
      {{- include "obarena.platformScheduling" . | nindent 6 }}
      containers:
        - name: build-service
          image: {{ include "obarena.image" (list . "build-service") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: REDPANDA_BROKERS
              value: "redpanda.platform.svc.cluster.local:9092"
            - name: SEAWEEDFS_ENDPOINT
              value: "http://seaweedfs.platform.svc.cluster.local:8333"
          resources:
            {{- toYaml .Values.resources.buildService | nindent 12 }}
          livenessProbe:
            exec:
              command: ["pidof", "build-service"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
