apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: timescaledb
  template:
    metadata:
      labels:
        {{- include "obarena.labels" . | nindent 8 }}
        app.kubernetes.io/name: timescaledb
    spec:
      {{- include "obarena.platformScheduling" . | nindent 6 }}
      containers:
        - name: timescaledb
          image: {{ .Values.thirdParty.timescaledb.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: obarena-timescaledb
                  key: password
            - name: POSTGRES_DB
              value: "obarena"
          ports:
            - name: postgres
              containerPort: 5432
          resources:
            requests:
              memory: 256Mi
              cpu: "250m"
            limits:
              memory: 512Mi
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: pgdata
              # PG 18+ images store data in a versioned subdir under /var/lib/postgresql.
              mountPath: /var/lib/postgresql
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: timescaledb-data
