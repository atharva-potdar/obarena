{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: builds
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandboxes-ingress
  namespace: sandboxes
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bots
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandboxes-egress
  namespace: sandboxes
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
          podSelector:
            matchLabels:
              app.kubernetes.io/name: seaweedfs
      ports:
        - protocol: TCP
          port: 8333
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: bots
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sandboxes
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
          podSelector:
            matchLabels:
              app.kubernetes.io/name: redpanda
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-egress
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API — scoped to k0s default service CIDR only
    - to:
        - ipBlock:
            cidr: 10.96.0.0/12
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # Redpanda
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redpanda
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9644
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # TimescaleDB
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: timescaledb
      ports:
        - protocol: TCP
          port: 5432
    # SeaweedFS
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: seaweedfs
      ports:
        - protocol: TCP
          port: 9333
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8333
    # builds — K8s exec only (platform manages build pods via API, no direct pod traffic)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: builds
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # sandboxes — K8s API only
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sandboxes
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # bots — K8s API only
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bots
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
{{- end }}
