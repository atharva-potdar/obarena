{{- if .Values.networkPolicies.enabled }}

# ─── PLATFORM NAMESPACE ───────────────────────────────────────────────────────

# Default deny all ingress and egress for platform namespace
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: platform-default-deny
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            cilium-default-deny: "true"
  egress:
    - toEndpoints:
        - matchLabels:
            cilium-default-deny: "true"
---
# submission-api: inbound from internet + kubelet probes, outbound to Redpanda + SeaweedFS + DNS
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: submission-api
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: submission-api
  ingress:
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Kubelet readiness/liveness probes
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Redpanda
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: redpanda
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP
    # SeaweedFS — presigned URL generation
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: seaweedfs
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
---
# build-service: no HTTP server — egress only to Redpanda + SeaweedFS + K8s API + DNS
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: build-service
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: build-service
  ingress: []
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Redpanda
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: redpanda
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP
    # SeaweedFS — source download + binary upload
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: seaweedfs
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
    # Kubernetes API — build pod exec/create/delete in builds namespace
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
