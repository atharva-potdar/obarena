{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: builds
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-bots
  namespace: sandboxes
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bots
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: bots
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sandboxes
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
          podSelector:
            matchLabels:
              app.kubernetes.io/name: redpanda
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-seaweedfs-egress
  namespace: sandboxes
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
          podSelector:
            matchLabels:
              app.kubernetes.io/name: seaweedfs
      ports:
        - protocol: TCP
          port: 8333
---
# Single egress policy for platform (do not pair with a separate deny-all policy;
# on k3s that combination can block API access even when allow rules include :443).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-egress
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API (ClusterIP :443 and k3s/node backends :6443)
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    - to:
        - ipBlock:
            cidr: 172.16.0.0/12
      ports:
        - protocol: TCP
          port: 6443
    - to:
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 6443
    # Redpanda
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redpanda
      ports:
        - protocol: TCP
          port: 9092
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # TimescaleDB
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: timescaledb
      ports:
        - protocol: TCP
          port: 5432
    # SeaweedFS
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: seaweedfs
      ports:
        - protocol: TCP
          port: 9333 # master
        - protocol: TCP
          port: 8080 # volume
        - protocol: TCP
          port: 8333 # filer/s3
    # Sandboxes, Builds, Bots Namespaces
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sandboxes
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: builds
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bots
{{- end }}
