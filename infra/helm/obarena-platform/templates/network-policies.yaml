apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: builds
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-bots
  namespace: sandboxes
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bots
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-egress
  namespace: bots
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sandboxes
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
          podSelector:
            matchLabels:
              app.kubernetes.io/name: redpanda
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-seaweedfs-egress
  namespace: sandboxes
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
          podSelector:
            matchLabels:
              app.kubernetes.io/name: seaweedfs
      ports:
        - protocol: TCP
          port: 8333
---
# [NEW] Default deny egress on platform
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
---
# [NEW] Explicit allow egress for platform
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-allow-egress
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API Server (required for platform orchestrators to spawn pods)
    - ports:
        - protocol: TCP
          port: 443
    # Redpanda
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redpanda
      ports:
        - protocol: TCP
          port: 9092
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # TimescaleDB
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: timescaledb
      ports:
        - protocol: TCP
          port: 5432
    # SeaweedFS
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: seaweedfs
      ports:
        - protocol: TCP
          port: 9333 # master
        - protocol: TCP
          port: 8080 # volume
        - protocol: TCP
          port: 8333 # filer/s3
    # Sandboxes, Builds, Bots Namespaces
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sandboxes
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: builds
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bots
