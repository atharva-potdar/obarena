---
# bot-runner Jobs: egress to sandboxes (WebSocket) + Redpanda (metrics) + DNS
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: bot-runner
  namespace: bots
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: bot-runner
  ingress: []
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Sandboxes — WebSocket load test traffic
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: sandboxes
            app.kubernetes.io/name: sandbox
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Redpanda — publish bot.metrics
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: redpanda
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP

{{- end }}
