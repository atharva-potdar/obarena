# seaweedfs: ingress from submission-api, build-service, sandbox-orchestrator,
# sandbox InitContainers, build pods, and kubelet probes.
# Port 8080 is the volume server — the filer on 8333 redirects PUT/GET to it.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: seaweedfs-ingress
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
  ingress:
    # Kubelet readiness/liveness probes
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
            - port: "9333"
              protocol: TCP
            - port: "8080"
              protocol: TCP
    # submission-api — presigned URL generation
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: submission-api
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
    # build-service — source download + binary upload
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: build-service
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
    # sandbox-orchestrator — presigned URL generation for InitContainer
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: sandbox-orchestrator
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
    # sandbox pods — binary download (InitContainer wget + volume server redirect)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: sandboxes
            app.kubernetes.io/name: sandbox
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
            - port: "8080"
              protocol: TCP
    # build pods — source download + binary upload (curl + volume server redirect)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: builds
            app.kubernetes.io/name: build
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
            - port: "8080"
              protocol: TCP
    # seaweedfs-init hook — wait-for-seaweedfs polls master health on 9333,
    # create-buckets hits S3 API on 8333
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: seaweedfs-init
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
            - port: "9333"
              protocol: TCP
---
