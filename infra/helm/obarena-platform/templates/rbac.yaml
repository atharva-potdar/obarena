apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-orchestrator
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: build-service
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bot-orchestrator
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-pod-manager
  namespace: sandboxes
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-orchestrator-binding
  namespace: sandboxes
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: sandbox-orchestrator
    namespace: platform
roleRef:
  kind: Role
  name: sandbox-pod-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: build-pod-manager
  namespace: builds
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: build-service-binding
  namespace: builds
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: build-service
    namespace: platform
roleRef:
  kind: Role
  name: build-pod-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: runtimeclass-reader
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
rules:
  - apiGroups: ["node.k8s.io"]
    resources: ["runtimeclasses"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sandbox-orchestrator-runtimeclass
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: sandbox-orchestrator
    namespace: platform
roleRef:
  kind: ClusterRole
  name: runtimeclass-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bot-job-manager
  namespace: bots
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bot-orchestrator-binding
  namespace: bots
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: bot-orchestrator
    namespace: platform
roleRef:
  kind: Role
  name: bot-job-manager
  apiGroup: rbac.authorization.k8s.io
