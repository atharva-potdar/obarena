---
# ═══════════════════════════════════════════════════════════════════════════════
# Play 1: Install k0s controller + core infrastructure
# ═══════════════════════════════════════════════════════════════════════════════
# Dev:  single-node controller+worker (--enable-worker --no-taints)
# Prod: controller only (workers join separately in Play 3)
# ═══════════════════════════════════════════════════════════════════════════════

- name: Install k0s controller
  hosts: k0s_controller
  become: true
  gather_facts: true

  vars:
    # Resolved at runtime — works on bare metal and cloud alike
    node_ip: "{{ ansible_facts['default_ipv4']['address'] }}"

  tasks:
    # ─── k0s binary ──────────────────────────────────────────────────────────

    - name: Download k0s install script
      ansible.builtin.get_url:
        url: https://get.k0s.sh
        dest: /tmp/get-k0s.sh
        mode: "0755"

    - name: Run k0s install script
      ansible.builtin.command: /tmp/get-k0s.sh
      args:
        creates: /usr/local/bin/k0s

    - name: Verify k0s binary
      ansible.builtin.command: k0s version
      register: k0s_ver
      changed_when: false

    - name: Show k0s version
      ansible.builtin.debug:
        msg: "{{ k0s_ver.stdout }}"

    # ─── k0s config ──────────────────────────────────────────────────────────
    # In prod, injects the sandbox-static workerProfile for CPU pinning.
    # In dev, generates a minimal config with no worker profiles.

    - name: Create k0s config directory
      ansible.builtin.file:
        path: /etc/k0s
        state: directory
        mode: "0755"

    - name: Write k0s config
      ansible.builtin.copy:
        dest: "{{ k0s_config_path }}"
        mode: "0644"
        content: |
          apiVersion: k0s.k0sproject.io/v1beta1
          kind: ClusterConfig
          metadata:
            name: k0s
          spec:
            network:
              provider: custom
              kubeProxy:
                disabled: true
              podCIDR: {{ pod_cidr }}
              serviceCIDR: {{ service_cidr }}
          {% if env == 'prod' %}
            workerProfiles:
              - name: sandbox-static
                values:
                  cpuManagerPolicy: static
                  topologyManagerPolicy: single-numa-node
                  memoryManagerPolicy: Static
                  kubeReserved:
                    cpu: "{{ sandbox_kube_reserved_cpu }}"
                    memory: "{{ sandbox_kube_reserved_memory }}"
                  systemReserved:
                    cpu: "{{ sandbox_system_reserved_cpu }}"
                    memory: "{{ sandbox_system_reserved_memory }}"
          {% endif %}

    # ─── k0s service ─────────────────────────────────────────────────────────

    - name: Install k0s as a systemd service (dev — single node)
      ansible.builtin.command: >
        k0s install controller
        --enable-worker
        --no-taints
        --config {{ k0s_config_path }}
      args:
        creates: /etc/systemd/system/k0scontroller.service
      when: env == 'dev'

    - name: Install k0s as a systemd service (prod — controller only)
      ansible.builtin.command: >
        k0s install controller
        --config {{ k0s_config_path }}
      args:
        creates: /etc/systemd/system/k0scontroller.service
      when: env == 'prod'

    - name: Start and enable k0s service
      ansible.builtin.systemd:
        name: k0scontroller
        state: started
        enabled: true
        daemon_reload: true

    - name: Wait for k0s API server to become reachable
      ansible.builtin.wait_for:
        host: "{{ node_ip }}"
        port: 6443
        delay: 10
        timeout: 120
        state: started

    - name: Wait for k0s to report healthy
      ansible.builtin.command: k0s status
      register: k0s_status
      until: "'Kube-api probing successful: true' in k0s_status.stdout"
      retries: 18
      delay: 10
      changed_when: false

    # ─── kubeconfig ──────────────────────────────────────────────────────────

    - name: Create .kube directory for root
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: "0700"

    - name: Export kubeconfig for root
      ansible.builtin.shell: k0s kubeconfig admin > /root/.kube/config
      args:
        creates: /root/.kube/config

    - name: Set kubeconfig permissions
      ansible.builtin.file:
        path: /root/.kube/config
        mode: "0600"

    # Export kubeconfig for the non-root ansible user as well
    - name: Create .kube directory for ansible user
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        mode: "0700"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      when: ansible_user is defined and ansible_user != 'root'

    - name: Copy kubeconfig for ansible user
      ansible.builtin.copy:
        src: /root/.kube/config
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      when: ansible_user is defined and ansible_user != 'root'

    # ─── Worker join token (prod only) ────────────────────────────────────────

    - name: Generate worker join token
      ansible.builtin.command: k0s token create --role worker
      register: k0s_worker_token
      changed_when: false
      when: env == 'prod'

    - name: Save worker token to file
      ansible.builtin.copy:
        content: "{{ k0s_worker_token.stdout }}"
        dest: /etc/k0s/worker-token
        mode: "0600"
      when: env == 'prod'

    # ─── Helm ────────────────────────────────────────────────────────────────

    - name: Check if Helm is already installed
      ansible.builtin.command: helm version --short
      register: helm_check
      ignore_errors: true
      changed_when: false

    - name: Install Helm
      when: helm_check.rc != 0
      block:
        - name: Set Helm archive name
          ansible.builtin.set_fact:
            helm_arch: >-
              {{
                'arm64' if ansible_architecture == 'aarch64'
                else 'amd64'
              }}

        - name: Download Helm archive
          ansible.builtin.get_url:
            url: "https://get.helm.sh/helm-{{ helm_version }}-linux-{{ helm_arch | trim }}.tar.gz"
            dest: /tmp/helm.tar.gz
            mode: "0644"

        - name: Extract Helm binary
          ansible.builtin.unarchive:
            src: /tmp/helm.tar.gz
            dest: /tmp
            remote_src: true

        - name: Install Helm binary
          ansible.builtin.copy:
            src: "/tmp/linux-{{ helm_arch | trim }}/helm"
            dest: "{{ helm_install_dir }}/helm"
            remote_src: true
            mode: "0755"

        - name: Clean up Helm temp files
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/helm.tar.gz
            - "/tmp/linux-{{ helm_arch | trim }}"

    # ─── Cilium ──────────────────────────────────────────────────────────────

    - name: Add Cilium Helm repository
      ansible.builtin.command: helm repo add cilium https://helm.cilium.io/
      environment:
        KUBECONFIG: /root/.kube/config
      register: helm_repo_add
      changed_when: "'already exists' not in helm_repo_add.stdout"

    - name: Update Helm repositories
      ansible.builtin.command: helm repo update
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    - name: Check if Cilium is already installed
      ansible.builtin.command: helm status cilium -n {{ cilium_namespace }}
      environment:
        KUBECONFIG: /root/.kube/config
      register: cilium_status
      failed_when: false
      changed_when: false

    - name: Install Cilium
      ansible.builtin.command: >
        helm install cilium cilium/cilium
        --version {{ cilium_version }}
        --namespace {{ cilium_namespace }}
        --set kubeProxyReplacement=true
        --set k8sServiceHost={{ node_ip }}
        --set k8sServicePort=6443
        --set routingMode=tunnel
        --set tunnelProtocol=vxlan
        --set ipam.mode=cluster-pool
        --set ipam.operator.clusterPoolIPv4PodCIDRList='{{ "{" }}{{ pod_cidr }}{{ "}" }}'
        --set hubble.enabled=true
        --set hubble.relay.enabled=true
        --set envoy.enabled=true
        --set envoyConfig.enabled=true
      environment:
        KUBECONFIG: /root/.kube/config
      when: cilium_status.rc != 0
      changed_when: true

    - name: Apply Cilium CRDs
      ansible.builtin.command: >
        kubectl apply -f
        https://raw.githubusercontent.com/cilium/cilium/v{{ cilium_version }}/pkg/k8s/apis/cilium.io/client/crds/v2/{{ item }}
      environment:
        KUBECONFIG: /root/.kube/config
      loop:
        - ciliumenvoyconfigs.yaml
      changed_when: false

    - name: Wait for Cilium CRDs to be established
      ansible.builtin.command: >
        kubectl wait crd/ciliumenvoyconfigs.cilium.io
        --for=condition=Established
        --timeout=30s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    # ─── Verify ──────────────────────────────────────────────────────────────

    - name: Wait for Cilium daemonset to be ready
      ansible.builtin.command: >
        k0s kubectl rollout status daemonset/cilium
        -n {{ cilium_namespace }}
        --timeout=300s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    - name: Wait for node to become Ready
      ansible.builtin.command: >
        k0s kubectl wait node --all
        --for=condition=Ready
        --timeout=300s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    - name: Check Cilium status
      ansible.builtin.command: >
        k0s kubectl -n {{ cilium_namespace }}
        exec ds/cilium -- cilium status
      environment:
        KUBECONFIG: /root/.kube/config
      register: cilium_final_status
      changed_when: false

    - name: Show Cilium status
      ansible.builtin.debug:
        msg: "{{ cilium_final_status.stdout_lines }}"

    # ─── Storage: Dev (Longhorn) ────────────────────────────────────────────
    # Longhorn provides software-defined storage for local/bare-metal dev.
    # NOT used in prod — Longhorn on EBS is double replication (software
    # network replication on top of already-replicated block storage).

    - name: Map iSCSI and NFS packages per OS family
      ansible.builtin.set_fact:
        iscsi_package: >-
          {{
            'open-iscsi' if ansible_os_family == 'Archlinux' or ansible_os_family == 'Debian'
            else 'iscsi-initiator-utils' if ansible_os_family == 'RedHat'
            else ''
          }}
        nfs_package: >-
          {{
            'nfs-utils' if ansible_os_family == 'Archlinux' or ansible_os_family == 'RedHat'
            else 'nfs-common' if ansible_os_family == 'Debian'
            else ''
          }}
        iscsi_service: "iscsid"
      when: env == 'dev'

    - name: Fail if OS family is unsupported for Longhorn prerequisites
      ansible.builtin.fail:
        msg: "Unsupported OS family: {{ ansible_os_family }}. Cannot install Longhorn prerequisites."
      when: env == 'dev' and (iscsi_package == '' or nfs_package == '')

    - name: Install iSCSI and NFS packages
      ansible.builtin.package:
        name:
          - "{{ iscsi_package }}"
          - "{{ nfs_package }}"
        state: present
      when: env == 'dev'

    - name: Start and enable iSCSI service
      ansible.builtin.systemd:
        name: "{{ iscsi_service }}"
        state: started
        enabled: true
      when: env == 'dev'

    - name: Add Longhorn Helm repository
      ansible.builtin.command: helm repo add longhorn https://charts.longhorn.io
      environment:
        KUBECONFIG: /root/.kube/config
      register: longhorn_repo_add
      changed_when: "'already exists' not in longhorn_repo_add.stdout"
      when: env == 'dev'

    - name: Update Helm repositories for Longhorn
      ansible.builtin.command: helm repo update
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false
      when: env == 'dev'

    - name: Create Longhorn namespace
      ansible.builtin.shell: >
        k0s kubectl create namespace {{ longhorn_namespace }}
        --dry-run=client -o yaml
        | k0s kubectl apply -f -
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false
      when: env == 'dev'

    - name: Check if Longhorn is already installed
      ansible.builtin.command: helm status longhorn -n {{ longhorn_namespace }}
      environment:
        KUBECONFIG: /root/.kube/config
      register: longhorn_status
      failed_when: false
      changed_when: false
      when: env == 'dev'

    - name: Install Longhorn via Helm
      ansible.builtin.command: >
        helm upgrade --install longhorn longhorn/longhorn
        --version {{ longhorn_version }}
        --namespace {{ longhorn_namespace }}
        --set defaultSettings.defaultDataPath={{ longhorn_data_path }}
        --set defaultSettings.defaultReplicaCount={{ longhorn_replica_count }}
        --set defaultSettings.createDefaultDiskLabeledNodes=true
        --set csi.attacherReplicaCount={{ longhorn_replica_count }}
        --set csi.provisionerReplicaCount={{ longhorn_replica_count }}
        --set csi.resizerReplicaCount={{ longhorn_replica_count }}
        --set csi.snapshotterReplicaCount={{ longhorn_replica_count }}
        --set persistence.defaultClass=false
        --set persistence.createStorageClass=false
      environment:
        KUBECONFIG: /root/.kube/config
      when: env == 'dev' and (longhorn_status.rc is defined and longhorn_status.rc != 0)
      changed_when: true

    - name: Label Kubernetes nodes for Longhorn default disk
      ansible.builtin.shell: >
        for node in $(k0s kubectl get nodes -o jsonpath='{.items[*].metadata.name}'); do
          k0s kubectl label node "$node" node.longhorn.io/create-default-disk=true --overwrite;
        done
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false
      when: env == 'dev'

    # ─── Longhorn Verification (dev only) ──────────────────────────────────

    - name: Wait for Longhorn manager daemonset to be ready
      ansible.builtin.command: >
        k0s kubectl rollout status daemonset/longhorn-manager
        -n {{ longhorn_namespace }}
        --timeout=300s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false
      when: env == 'dev'

    - name: Wait for Longhorn driver deployer deployment to be ready
      ansible.builtin.command: >
        k0s kubectl rollout status deployment/longhorn-driver-deployer
        -n {{ longhorn_namespace }}
        --timeout=300s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false
      when: env == 'dev'

    - name: Wait for Longhorn CSI plugin daemonset resource to exist
      ansible.builtin.shell: >
        k0s kubectl get daemonset/longhorn-csi-plugin -n {{ longhorn_namespace }}
      environment:
        KUBECONFIG: /root/.kube/config
      register: csi_ds_check
      until: csi_ds_check.rc == 0
      retries: 30
      delay: 5
      changed_when: false
      when: env == 'dev'

    - name: Wait for Longhorn CSI plugin daemonset to be ready
      ansible.builtin.command: >
        k0s kubectl rollout status daemonset/longhorn-csi-plugin
        -n {{ longhorn_namespace }}
        --timeout=300s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false
      when: env == 'dev'

    # ─── Storage: Prod (AWS EBS CSI driver + gp3) ─────────────────────────
    # Native gp3 via EBS CSI driver. Direct block device attachment via DMA,
    # no software replication. WaitForFirstConsumer ensures the volume is
    # created in the same AZ as the pod.

    - name: Add AWS EBS CSI driver Helm repository
      ansible.builtin.command: helm repo add aws-ebs-csi-driver https://kubernetes-sigs.github.io/aws-ebs-csi-driver
      environment:
        KUBECONFIG: /root/.kube/config
      register: ebs_repo_add
      changed_when: "'already exists' not in ebs_repo_add.stdout"
      when: env == 'prod'

    - name: Update Helm repositories for EBS CSI
      ansible.builtin.command: helm repo update
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false
      when: env == 'prod'

    - name: Check if EBS CSI driver is already installed
      ansible.builtin.command: helm status aws-ebs-csi-driver -n kube-system
      environment:
        KUBECONFIG: /root/.kube/config
      register: ebs_csi_status
      failed_when: false
      changed_when: false
      when: env == 'prod'

    - name: Install AWS EBS CSI driver via Helm
      ansible.builtin.command: >
        helm upgrade --install aws-ebs-csi-driver
        aws-ebs-csi-driver/aws-ebs-csi-driver
        --namespace kube-system
      environment:
        KUBECONFIG: /root/.kube/config
      when: env == 'prod' and (ebs_csi_status.rc is defined and ebs_csi_status.rc != 0)
      changed_when: true

    - name: Wait for EBS CSI controller to be ready
      ansible.builtin.command: >
        k0s kubectl rollout status deployment/ebs-csi-controller
        -n kube-system
        --timeout=300s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false
      when: env == 'prod'

    - name: Create gp3 StorageClass (prod default)
      ansible.builtin.shell: |
        cat <<'EOF' | k0s kubectl apply -f -
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: gp3
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
        provisioner: ebs.csi.aws.com
        volumeBindingMode: WaitForFirstConsumer
        parameters:
          type: gp3
          fsType: ext4
          iops: "3000"
          throughput: "125"
        EOF
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false
      when: env == 'prod'

# ═══════════════════════════════════════════════════════════════════════════════
# Play 2: Kernel tuning for sandbox nodes (prod only)
# ═══════════════════════════════════════════════════════════════════════════════
# Configures GRUB boot parameters for CPU isolation, disables irqbalance,
# forces the performance CPU governor, sets vm.swappiness=0, and distributes
# the seccomp profile. Only runs when env == 'prod'.
# ═══════════════════════════════════════════════════════════════════════════════

- name: Kernel tuning for sandbox nodes
  hosts: sandbox
  become: true
  gather_facts: true

  tasks:
    - name: Skip kernel tuning in dev
      ansible.builtin.meta: end_play
      when: env != 'prod'

    # ─── Seccomp profile distribution ──────────────────────────────────────

    - name: Ensure seccomp directory exists
      ansible.builtin.file:
        path: /var/lib/k0s/kubelet/seccomp
        state: directory
        mode: "0755"

    - name: Distribute custom seccomp profile to sandbox nodes
      ansible.builtin.copy:
        src: files/sandbox-seccomp.json
        dest: /var/lib/k0s/kubelet/seccomp/sandbox-seccomp.json
        mode: "0644"

    # ─── GRUB kernel isolation ─────────────────────────────────────────────

    - name: Append isolation parameters to GRUB
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: "^GRUB_CMDLINE_LINUX="
        line: 'GRUB_CMDLINE_LINUX="{{ sandbox_grub_params }}"'
        backup: true
      register: grub_changed

    - name: Regenerate GRUB config
      ansible.builtin.command: update-grub
      when: grub_changed.changed

    - name: Reboot to apply kernel parameters
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: grub_changed.changed

    - name: Verify kernel boot parameters
      ansible.builtin.command: cat /proc/cmdline
      register: cmdline
      changed_when: false

    - name: Assert isolation parameters are active
      ansible.builtin.assert:
        that:
          - "'isolcpus={{ sandbox_isolated_cpus }}' in cmdline.stdout"
          - "'nohz_full={{ sandbox_isolated_cpus }}' in cmdline.stdout"
          - "'rcu_nocbs={{ sandbox_isolated_cpus }}' in cmdline.stdout"
        fail_msg: "Kernel isolation parameters not applied. /proc/cmdline: {{ cmdline.stdout }}"

    # ─── Disable irqbalance ────────────────────────────────────────────────
    # Prevents hardware network interrupts from landing on isolated cores.
    # When stopped, the kernel routes IRQs to housekeeping cores (0-1).

    - name: Disable irqbalance to protect sandbox cores from network interrupts
      ansible.builtin.systemd:
        name: irqbalance
        state: stopped
        enabled: false
      ignore_errors: true # irqbalance may not be installed on all distros

    # ─── Force performance CPU governor ────────────────────────────────────
    # With intel_pstate=disable, the kernel falls back to acpi-cpufreq with
    # the ondemand governor. This creates a systemd oneshot to lock all cores
    # at max frequency on every boot.

    - name: Create CPU governor systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/cpu-governor-performance.service
        mode: "0644"
        content: |
          [Unit]
          Description=Set CPU governor to performance
          After=cpufreq.service

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'echo performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor'
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start CPU governor service
      ansible.builtin.systemd:
        name: cpu-governor-performance
        state: started
        enabled: true
        daemon_reload: true

    # ─── Disable memory swap jitter ────────────────────────────────────────
    # Prevents the kernel from swapping container memory pages to disk.

    - name: Disable kernel swappiness
      ansible.posix.sysctl:
        name: vm.swappiness
        value: "0"
        state: present
        reload: true

# ═══════════════════════════════════════════════════════════════════════════════
# Play 3: Join workers to the k0s cluster (prod only)
# ═══════════════════════════════════════════════════════════════════════════════
# Platform workers join with the default kubelet profile.
# Sandbox workers join with the sandbox-static profile (CPU pinning) and
# are tainted + labeled to prevent platform workloads from scheduling there.
# ═══════════════════════════════════════════════════════════════════════════════

- name: Join k0s workers
  hosts: k0s_all_workers
  become: true
  gather_facts: true

  tasks:
    - name: Skip worker join in dev
      ansible.builtin.meta: end_play
      when: env != 'prod'

    # ─── k0s binary ──────────────────────────────────────────────────────────

    - name: Download k0s install script
      ansible.builtin.get_url:
        url: https://get.k0s.sh
        dest: /tmp/get-k0s.sh
        mode: "0755"

    - name: Run k0s install script
      ansible.builtin.command: /tmp/get-k0s.sh
      args:
        creates: /usr/local/bin/k0s

    # ─── Worker token ────────────────────────────────────────────────────────

    - name: Create k0s config directory
      ansible.builtin.file:
        path: /etc/k0s
        state: directory
        mode: "0755"

    - name: Copy worker token from controller
      ansible.builtin.copy:
        content: "{{ hostvars[groups['k0s_controller'][0]].k0s_worker_token.stdout }}"
        dest: /etc/k0s/worker-token
        mode: "0600"

    # ─── Join: platform workers (default kubelet config) ──────────────────

    - name: Install k0s worker (platform)
      ansible.builtin.command: >
        k0s install worker
        --token-file /etc/k0s/worker-token
      args:
        creates: /etc/systemd/system/k0sworker.service
      when: "'sandbox' not in group_names"

    # ─── Join: sandbox workers (static CPU manager + taints/labels) ───────
    # The --profile flag activates the sandbox-static workerProfile defined
    # in the controller's k0s.yaml. Labels and taints ensure only sandbox
    # pods schedule here — platform workloads are rejected.

    - name: Install k0s worker (sandbox — static CPU pinning)
      ansible.builtin.command: >
        k0s install worker
        --token-file /etc/k0s/worker-token
        --profile sandbox-static
        --labels node-type=sandbox
        --taints sandbox=true:NoSchedule
      args:
        creates: /etc/systemd/system/k0sworker.service
      when: "'sandbox' in group_names"

    # ─── Start worker ────────────────────────────────────────────────────────

    - name: Start and enable k0s worker service
      ansible.builtin.systemd:
        name: k0sworker
        state: started
        enabled: true
        daemon_reload: true

    - name: Wait for worker to register with the cluster
      ansible.builtin.command: >
        k0s status
      register: worker_status
      until: worker_status.rc == 0
      retries: 12
      delay: 10
      changed_when: false
